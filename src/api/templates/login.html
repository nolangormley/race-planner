{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel" style="animation: fade-up 0.5s ease-out">
    <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Welcome Back</h1>
    
    {% if error %}
    <div style="background: rgba(244, 63, 94, 0.2); border: 1px solid var(--primary); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="username" class="form-control" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Sign In</button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem; color: var(--text-muted)">
        Don't have an account? <a href="/register" class="link">Create one</a>
    </p>
</div>

<style>
@keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
{% endblock %}
