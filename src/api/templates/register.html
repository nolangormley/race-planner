{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel" style="animation: fade-up 0.5s ease-out; max-width: 600px;">
    <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Create Your Account</h1>
    
    {% if error %}
    <div style="background: rgba(244, 63, 94, 0.2); border: 1px solid var(--primary); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}

    <form action="/register" method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group" style="grid-column: span 2;">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
            </div>
            
            <div class="form-group" style="grid-column: span 2;">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
            </div>
            
            <div class="form-group" style="grid-column: span 2;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label for="date_of_birth">Date of Birth</label>
                <input type="date" id="date_of_birth" name="date_of_birth" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" class="form-control" required>
                    <option value="" disabled selected>Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" name="height" class="form-control" required placeholder="175">
            </div>
            
            <div class="form-group">
                <label for="weight">Weight (lbs)</label>
                <input type="number" id="weight" name="weight" class="form-control" required placeholder="150">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Create Account</button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem; color: var(--text-muted)">
        Already have an account? <a href="/login" class="link">Sign in</a>
    </p>
</div>

<style>
@keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
/* For standardizing inputs across browsers */
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}
</style>
{% endblock %}
