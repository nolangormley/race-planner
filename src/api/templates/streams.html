<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Streams - Strava Warehouse</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chart-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 2rem;
            height: 400px;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
            </div>
            <h2>Strava Warehouse</h2>
        </div>
        <div>
            <a href="/dashboard" class="btn">← Back to Dashboard</a>
        </div>
    </header>

    <main class="container">
        <div class="header-actions">
            <div>
                <h1 id="activity-name">Loading...</h1>
                <p class="subtitle" id="activity-date">Fetching details...</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-dist">--</div>
                <div class="stat-label">Distance</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-time">--</div>
                <div class="stat-label">Moving Time</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-pace">--</div>
                <div class="stat-label">Avg Pace</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-hr">--</div>
                <div class="stat-label">Avg HR</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-elev">--</div>
                <div class="stat-label">Elevation</div>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="hrChart"></canvas>
        </div>

        <div class="chart-wrapper">
            <canvas id="paceChart"></canvas>
        </div>

        <div class="chart-wrapper">
            <canvas id="elevationChart"></canvas>
        </div>

    </main>

    <script>
        const activityId = "{{ activity_id }}";

        // Globals for Charts
        Chart.defaults.color = '#c9d1d9';
        Chart.defaults.font.family = 'Inter';

        function formatDistance(meters) {
            return (meters * 0.000621371).toFixed(2) + ' mi';
        }

        // Read user's unit preference
        const isMetric = localStorage.getItem('units') === 'metric';
        const paceUnit = isMetric ? 'min/km' : 'min/mi';
        // Conversion factor: m/s → decimal minutes per unit distance
        // min/mile = 26.8224 / v   |   min/km = 16.6667 / v
        const paceConvFactor = isMetric ? (1000 / 60) : (1609.34 / 60);

        function formatPaceStr(meters_per_sec) {
            if (!meters_per_sec || meters_per_sec === 0) return '--';
            const minsPerUnit = paceConvFactor / meters_per_sec;
            const m = Math.floor(minsPerUnit);
            const s = Math.floor((minsPerUnit - m) * 60).toString().padStart(2, '0');
            return `${m}:${s} ${paceUnit}`;
        }

        // Returns decimal minutes per unit (for chart Y axis)
        function paceToDecimal(meters_per_sec) {
            if (!meters_per_sec || meters_per_sec === 0) return null;
            return paceConvFactor / meters_per_sec;
        }

        function formatTimeMinSec(seconds) {
            const m = Math.floor(seconds / 60);
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function formatTimeDisplay(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m ${s}s`;
        }

        async function init() {
            try {
                // Fetch Details
                const res = await fetch(`/api/activities/${activityId}`);
                if (!res.ok) throw new Error("Activity not found");
                const act = await res.json();

                document.getElementById('activity-name').textContent = act.name;
                document.getElementById('activity-date').textContent = new Date(act.start_date_local).toLocaleString();

                document.getElementById('stat-dist').textContent = formatDistance(act.distance);
                document.getElementById('stat-time').textContent = formatTimeDisplay(act.moving_time);
                document.getElementById('stat-pace').textContent = formatPaceStr(act.average_speed);
                document.getElementById('stat-hr').textContent = act.average_heartrate ? Math.round(act.average_heartrate) : '--';
                document.getElementById('stat-elev').textContent = act.total_elevation_gain ? Math.round(act.total_elevation_gain * 3.28084) + ' ft' : '--';

                // Fetch Streams
                const streamRes = await fetch(`/api/activities/${activityId}/streams`);
                const streams = await streamRes.json();

                if (streams.length > 0) {
                    renderCharts(streams);
                }

            } catch (e) {
                document.getElementById('activity-name').textContent = "Error Loading Activity";
                document.getElementById('activity-date').textContent = e.toString();
            }
        }

        function renderCharts(data) {
            const labels = data.map(d => formatTimeMinSec(d.time_offset));
            const hrData = data.map(d => d.heartrate);
            const paceData = data.map(d => paceToDecimal(d.velocity));
            const elevData = data.map(d => d.altitude ? d.altitude * 3.28084 : null);

            // Heart Rate Chart
            const ctxHr = document.getElementById('hrChart').getContext('2d');
            const hrGradient = ctxHr.createLinearGradient(0, 0, 0, 400);
            hrGradient.addColorStop(0, 'rgba(248, 81, 73, 0.5)'); // Reddish
            hrGradient.addColorStop(1, 'rgba(248, 81, 73, 0.0)');

            new Chart(ctxHr, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Heart Rate (bpm)',
                        data: hrData,
                        borderColor: '#f85149',
                        backgroundColor: hrGradient,
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: getCommonOptions('Heart Rate', false)
            });

            // Pace Chart — only render if we have valid GPS velocity data
            const validPaceData = paceData.filter(v => v !== null && v > 0);
            if (validPaceData.length > 0) {
                const ctxPace = document.getElementById('paceChart').getContext('2d');
                const paceMin = Math.min(...validPaceData);
                const paceMax = Math.max(...validPaceData);

                // Custom plugin: manually draw gradient fill BELOW the pace line.
                // Chart.js built-in fill is unreliable on reversed Y-axes, so we
                // trace the polyline, close a polygon to the chart bottom, and fill it.
                const paceFillPlugin = {
                    id: 'paceFill',
                    afterDatasetsDraw(chart) {
                        const { ctx, chartArea } = chart;
                        const meta = chart.getDatasetMeta(0);
                        const pts = meta.data.filter(p => !isNaN(p.y) && p.y !== null);
                        if (pts.length < 2) return;

                        const bottom = chartArea.bottom;

                        ctx.save();
                        ctx.beginPath();
                        ctx.moveTo(pts[0].x, bottom);          // start at bottom-left
                        pts.forEach(p => ctx.lineTo(p.x, p.y)); // trace the line
                        ctx.lineTo(pts[pts.length - 1].x, bottom); // close to bottom-right
                        ctx.closePath();

                        // Gradient: transparent near the line (chartArea.top), blue at bottom
                        const grad = ctx.createLinearGradient(0, chartArea.top, 0, bottom);
                        grad.addColorStop(0, 'rgba(88, 166, 255, 0.0)');
                        grad.addColorStop(1, 'rgba(88, 166, 255, 0.40)');
                        ctx.fillStyle = grad;
                        ctx.fill();
                        ctx.restore();
                    }
                };

                new Chart(ctxPace, {
                    type: 'line',
                    plugins: [paceFillPlugin],
                    data: {
                        labels: labels,
                        datasets: [{
                            label: `Pace (${paceUnit})`,
                            data: paceData,
                            borderColor: '#58a6ff',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,    // manual fill via plugin above
                            tension: 0.4,
                            spanGaps: true
                        }]
                    },
                    options: getCommonOptions(`Pace (${paceUnit})`, true, paceMin * 0.98, paceMax * 1.02)
                });
            } else {
                document.getElementById('paceChart').parentElement.innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b949e;">No GPS pace data available for this activity.</div>';
            }

            // Elevation Chart — only render if we have valid altitude data
            const validElevData = elevData.filter(v => v !== null);
            if (validElevData.length > 0) {
                const ctxElev = document.getElementById('elevationChart').getContext('2d');
                const elevGradient = ctxElev.createLinearGradient(0, 0, 0, 400);
                elevGradient.addColorStop(0, 'rgba(46, 160, 67, 0.5)');
                elevGradient.addColorStop(1, 'rgba(46, 160, 67, 0.0)');

                const elevMin = Math.min(...validElevData);
                const elevMax = Math.max(...validElevData);

                new Chart(ctxElev, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Elevation (ft)',
                            data: elevData,
                            borderColor: '#2ea043',
                            backgroundColor: elevGradient,
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: getCommonOptions('Elevation (ft)', false, elevMin - 20, elevMax + 20)
                });
            } else {
                document.getElementById('elevationChart').parentElement.innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#8b949e;">No elevation data available for this activity.</div>';
            }
        }

        function getCommonOptions(title, reverseY, yMin = undefined, yMax = undefined) {
            return {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: { display: false },
                    title: {
                        display: true,
                        text: title,
                        color: '#f0f6fc',
                        font: { size: 16, weight: '600' },
                        align: 'start',
                        padding: { bottom: 20 }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(22, 27, 34, 0.9)',
                        titleColor: '#8b949e',
                        bodyColor: '#f0f6fc',
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        padding: 12,
                        displayColors: false,
                        callbacks: {
                            label: function (context) {
                                let val = context.parsed.y;
                                if (title.includes('Pace') && val) {
                                    const m = Math.floor(val);
                                    const s = Math.floor((val - m) * 60).toString().padStart(2, '0');
                                    return `${m}:${s} ${paceUnit}`;
                                }
                                return `${Math.round(val)}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { maxTicksLimit: 10 }
                    },
                    y: {
                        reverse: reverseY,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        beginAtZero: false,
                        ...(yMin !== undefined ? { min: yMin } : {}),
                        ...(yMax !== undefined ? { max: yMax } : {})
                    }
                }
            };
        }

        // Boot
        init();
    </script>
</body>

</html>
