{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-panel" style="animation: fade-up 0.5s ease-out; max-width: 500px;">
    <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Race Setup</h1>
    
    <p style="text-align: center;">Tell us about your upcoming goal race so we can customize your training.</p>

    {% if error %}
    <div style="background: rgba(244, 63, 94, 0.2); border: 1px solid var(--primary); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}

    <form action="/setup-race" method="POST">
        <div class="form-group">
            <label for="race_length">Race Length (e.g. 5K, 10K, Half Marathon)</label>
            <input type="text" id="race_length" name="race_length" class="form-control" required placeholder="Half Marathon">
        </div>
        
        <div class="form-group">
            <label for="race_date">Race Date</label>
            <input type="date" id="race_date" name="race_date" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="race_goal_time">Goal Time (optional)</label>
            <input type="text" id="race_goal_time" name="race_goal_time" class="form-control" placeholder="1:45:00">
        </div>

        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 2rem;">Continue to Strava</button>
    </form>
</div>

<style>
@keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}
</style>
{% endblock %}
